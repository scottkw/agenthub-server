name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -timeout 120s ./...
      - name: Build
        run: go build -o /tmp/agenthub-server ./cmd/agenthub-server
